<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscas CEP</title>
</head>
<body>
    <h2>Formulario de CEP</h2>

    <label for="cep"> Digite seu cep: </label>
    <input type="text" id="cep" placeholder="EX: 011000100">
    <br>
    <br>
    <label for="rua">Digite a rua: </label>
    <input type="text" id="rua" placeholder="EX: Ex: 10">
    <br>
    <br>
    <label for="cidade">Digite a cidade: </label>
    <input type="text" id="cidade" placeholder="Ex: Gama">
    <br>
    <br>
    <label for="estado">Digite seu estado: </label>
    <input type="text" id="estado" placeholder="EX: Brasília">
    <br>
    <br>
    <label for="bairro">Digite seu bairro</label>
    <input type="text" id="bairro" placeholder="EX: 7">

    <script src="buscarcep.js"></script>
</body>
</html>
